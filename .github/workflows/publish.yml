name: Publish

on:
  push:
    branches:
      - master

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Get current version
        id: version
        run: |
          VERSION=$(node -e "console.log(JSON.parse(require('fs').readFileSync('./firestack/package.json')).version)")
          echo "current=$VERSION" >> $GITHUB_OUTPUT

      - name: Bump version
        id: bump
        run: |
          cd firestack
          NEW_VERSION=$(node -e "const fs=require('fs'); const pkg=JSON.parse(fs.readFileSync('./package.json')); const p=pkg.version.split('.'); p[2]++; console.log(p.join('.'));")
          echo "new=$NEW_VERSION" >> $GITHUB_OUTPUT
          node -e "const fs=require('fs'); const pkg=JSON.parse(fs.readFileSync('./package.json')); pkg.version='$NEW_VERSION'; fs.writeFileSync('./package.json', JSON.stringify(pkg, null, 2)+'\n');"

      - name: Build and Publish
        run: |
          cd firestack
          bun install
          bun run build
          NPM_TOKEN=${{ secrets.NPM_TOKEN }} bun ./publish.ts

      - name: Commit version bump
        run: |
          cd firestack
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add package.json
          git commit -m "chore: bump version to ${{ steps.bump.outputs.new }}"
          git push
