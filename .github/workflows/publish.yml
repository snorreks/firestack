name: Publish

on:
  push:
    branches:
      - master

jobs:
  validate:
    name: Lint, Check & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
          cache: true

      - name: Install dependencies
        run: bun install

      - name: Run lint, check and test in parallel
        # biome check . (via lint script) covers both linting and formatting
        # tsc --noEmit (via check script) covers type checking
        # bun test (via test script) runs the tests
        run: |
          bun run build
          bun run lint &
          bun run check &
          bun run test &
          wait

  publish:
    name: Bump & Publish
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: "24.x"

      - name: Install dependencies
        run: bun install

      - name: Get current version
        id: version
        run: |
          VERSION=$(node -e "console.log(JSON.parse(require('fs').readFileSync('./package.json')).version)")
          echo "current=$VERSION" >> $GITHUB_OUTPUT

      - name: Bump version
        id: bump
        run: |
          NEW_VERSION=$(node -e "const fs=require('fs'); const pkg=JSON.parse(fs.readFileSync('./package.json')); const p=pkg.version.split('.'); p[2]++; console.log(p.join('.'));")
          echo "new=$NEW_VERSION" >> $GITHUB_OUTPUT
          node -e "const fs=require('fs'); const pkg=JSON.parse(fs.readFileSync('./package.json')); pkg.version='$NEW_VERSION'; fs.writeFileSync('./package.json', JSON.stringify(pkg, null, 2)+'\n');"

      - name: Build and Publish to npmjs (OIDC)
        run: |
          bun run build
          cd dist
          # Publish using OIDC (no token needed!)
          npm publish --access public --provenance

      - name: Publish to GitHub Packages
        run: |
          cd dist
          # Authenticate with GitHub Packages using the automatic GITHUB_TOKEN
          npm config set //npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}
          # Publish specifically to the GitHub registry
          npm publish --registry=https://npm.pkg.github.com

      - name: Commit version bump
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add package.json
          git commit -m "chore: bump version to ${{ steps.bump.outputs.new }}"
          git push
