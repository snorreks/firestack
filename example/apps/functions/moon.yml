# https://moonrepo.dev/docs/config/project
$schema: "https://moonrepo.dev/schemas/project.json"

tasks:
  build:
    command: 'bun run build'
    inputs:
      - "src/**/*"
      - "firestack.json"
    options:
      cache: false

  deploy:
    command: 'bun run deploy'
    inputs:
      - "src/**/*"
      - "firestack.json"
    options:
      cache: false

  delete:
    command: 'bun run delete'
    inputs:
      - "src/**/*"
      - "firestack.json"
    options:
      cache: false

  emulate:
    command: 'bun run emulate'
    inputs:
      - "src/**/*"
      - "firestack.json"
    options:
      cache: false
      persistent: true

  rules:
    command: 'bun run rules'
    inputs:
      - "src/**/*"
      - "firestack.json"
    options:
      cache: false

  scripts:
    script: 'bun run scripts'
    options:
      cache: false
      interactive: true

  logs:
    command: 'bun run logs'
    options:
      cache: false
  check:
    command: 'bun run check'
    options:
      cache: false
  fix:
    command: 'bun run fix'
    options:
      cache: false
