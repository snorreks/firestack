# https://moonrepo.dev/docs/config/project
$schema: 'https://moonrepo.dev/schemas/project.json'

tasks:
  build:
    command: 'bun run build'
    toolchain: 'bun'
    inputs:
      - 'src/**/*'
    outputs:
      - 'dist'

  lint:
    command: 'bun run lint'
    inputs:
      - 'src/**/*'

  format:
    command: 'bun run format'
    inputs:
      - 'src/**/*'

  publish:
    command: 'npm publish --access public'
    inputs:
      - 'dist/**/*'
      - 'package.json'
